<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World of Programming</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="text-white bg-gray-950 w-100%">
    <div
      class="fixed flex z-10 items-center gap-60 justify-center w-full p-4 backdrop-blur-xl border-b border-white/15 duration-300 shadow-[0_8px_32px_0_rgba(0,200,255,0.1)]"
    >
      <div
        class="flex justify-between items-center lg:gap-70 max-sm:gap-20 px-6 h-24"
      >
        <h1 class="text-2xl lg:text-4xl font-black">World of Programming</h1>
        <ul class="hidden lg:flex gap-10 items-center">
          <li class="hover:underline hover:text-2xl">
            <a href="./index.html">Home</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index1.html">Languages</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index2.html">Web Dev</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index3.html">Mobile Apps</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index4.html">Game Dev</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index5.html">Future</a>
          </li>
          <li class="underline text-2xl">
            <a href="./index6.html">Settings</a>
          </li>
          <li class="hover:underline hover:text-2xl">
            <a href="./index7.html">Сontrol</a>
          </li>
        </ul>
        <button class="hidden lg:block bg-blue-700 px-6 py-2 rounded-xl">
          Sign In
        </button>
        <button id="menuBtn" class="lg:hidden">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="34"
            height="34"
            fill="none"
            viewBox="0 0 24 24"
            stroke="white"
            stroke-width="2"
          >
            <path d="M3 6h18" />
            <path d="M3 12h18" />
            <path d="M3 18h18" />
          </svg>
        </button>
      </div>
      <div
        id="overlay"
        class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40"
      ></div>
      <div
        id="menu"
        class="fixed top-0 right-[-100%] w-72 h-screen bg-gray-900 z-50 transition-all duration-300 shadow-2xl rounded-l-3xl"
      >
        <div
          class="flex justify-between items-center p-6 border-b border-gray-700"
        >
          <h2 class="text-2xl font-bold">Menu</h2>

          <button id="closeBtn" class="text-3xl">✕</button>
        </div>

        <nav class="flex flex-col mt-5">
          <a
            href="./index.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            🏠 Home
          </a>

          <a
            href="./index1.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            💻 Languages
          </a>

          <a
            href="./index2.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            🌐 Web Dev
          </a>

          <a
            href="./index3.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            📱 Mobile Apps
          </a>

          <a
            href="./index4.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            🎮 Game Dev
          </a>

          <a
            href="./index5.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            🚀 Future
          </a>

          <a
            href="./index5.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            🎚️ Сontrol
          </a>

          <a
            href="./index5.html"
            class="px-8 py-4 hover:bg-blue-700 duration-300 rounded-lg mx-3"
          >
            ⚙️ Settings
          </a>

          <button
            class="mx-6 mt-8 bg-blue-700 py-3 rounded-xl hover:bg-blue-800"
          >
            Sign In
          </button>
        </nav>
        <script>
          const menu = document.getElementById("menu");
          const overlay = document.getElementById("overlay");

          document.getElementById("menuBtn").onclick = () => {
            menu.style.right = "0";
            overlay.classList.remove("hidden");
          };

          document.getElementById("closeBtn").onclick = closeMenu;
          overlay.onclick = closeMenu;

          function closeMenu() {
            menu.style.right = "-100%";
            overlay.classList.add("hidden");
          }
        </script>
      </div>
    </div>
  </body>
</html>
